name: aluminion_reads
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - nanoplot
  - chopper
  - pillow   # DPI metadata embedding in NanoPlot PNG output
  - kaleido  # Plotly static image export via PLOTLY_RENDERER=kaleido
             # NanoPlot 1.46.2 requires kaleido>=1.0.0; conda-forge resolves the right version
