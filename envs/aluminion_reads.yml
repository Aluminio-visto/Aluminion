name: aluminion_reads
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - nanoplot
  - chopper
  - pillow   # DPI metadata embedding in NanoPlot PNG output
  - pip
  - pip:
    - kaleido  # Plotly static image export via PLOTLY_RENDERER=kaleido
               # Not on conda-forge; pip installs the 1.x Go-based binary (~small, fast)
               # NanoPlot 1.46.2 requires kaleido>=1.0.0, so pip resolves the right version
