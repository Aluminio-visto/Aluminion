name: aluminion_reads
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - nanoplot
  - chopper
  - pillow       # DPI metadata embedding in NanoPlot PNG output
  - pip
  - pip:
    - kaleido==0.2.1  # Plotly static image export via PLOTLY_RENDERER=kaleido
                      # (bypasses choreographer browser dependency on headless servers)
