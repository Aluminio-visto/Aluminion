name: aluminion_reads
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.12  # Pin to stable release; Python 3.13/3.14 breaks kaleido wheels and pysam
  - nanoplot
  - chopper
  - pillow   # DPI metadata embedding in NanoPlot PNG output
  - pip
  - pip:
    - kaleido  # Plotly static image export via PLOTLY_RENDERER=kaleido
               # Not on conda-forge; requires Python 3.12 for stable binary wheels
