name: aluminion_assembly
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - kraken2
  - flye
  - quast
  - bandage
  - samtools
  - minimap2
  - biopython
  # The following are required by scripts/deconcat.py — without them, all
  # samples fall through to the "Deconcat failed" branch in aluminion.sh.
  - blast
  - mafft
  - emboss
  - pandas
  - matplotlib
